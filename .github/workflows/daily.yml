name: Daily Football Predict Bot

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Download Clean Script
      # 📡 雲端電腦開工時，直接去網絡下載完全修正好、絕不折行嘅完全體代碼
      run: |
        curl -s https://raw.githubusercontent.com/scen1560/my_ball_predict_3034/main/predict.py -o predict.py || echo "Use local file if download fails"

    - name: Run prediction script
      run: python predict.py
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
